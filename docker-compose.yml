# Solution Architect Stack - Ubuntu Z170
# Proyecto: n8n Personal Assistant (Product Edition)
# Version: 1.5.3 (Multi-Instance Compatible)

services:
  # --- INFRAESTRUCTURA DE DATOS ---
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-n8n_db}
    volumes:
      - ./volumes/postgres_data:/var/lib/postgresql/data
    networks:
      - internal

  pgadmin:
    image: dpage/pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "8082:80"
    depends_on:
      - db
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - internal

  # --- PROXY & TÚNEL ---
  proxy:
    image: jc21/nginx-proxy-manager:latest
    restart: always
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
    volumes:
      - ./volumes/npm_data:/data
      - ./volumes/npm_letsencrypt:/etc/letsencrypt
    networks:
      - internal
      - external

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel run --token ${CLOUDFLARE_TOKEN}
    depends_on:
      - proxy
    networks:
      - internal

  # --- INTELIGENCIA ARTIFICIAL (Ollama + UI) ---
  ollama:
    image: ollama/ollama:latest
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ./volumes/ollama_data:/root/.ollama
    networks:
      - internal

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    restart: always
    ports:
      - "8081:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ./volumes/open_webui_data:/app/backend/data
    depends_on:
      - ollama
    networks:
      - internal

  # --- AGENTE EJECUTOR (OpenHands / ClawCode) ---
  openhands:
    image: ghcr.io/all-hands-ai/openhands:0.9
    restart: always
    ports:
      - "3001:3000"
    environment:
      - LLM_BASE_URL=http://ollama:11434
      - LLM_MODEL=ollama/codestral
      - WORKSPACE_BASE=/home/${USER}/openhands_workspace
      - FILE_STORE=local
      - LOG_ALL_EVENTS=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./volumes/openhands:/opt/workspace_base
    depends_on:
      - ollama
    networks:
      - internal
      - external

  # --- INSTANCIA DE N8N ---
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    restart: always
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      - N8N_HOST=${N8N_ASISTENTE_URL}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - NODE_ENV=production
      - WEBHOOK_URL=https://${N8N_ASISTENTE_URL}/
      - N8N_PUSH_BACKEND=websocket
      - N8N_ENCRYPTION_KEY=${N8N_KEY_ASISTENTE}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-n8n_db}
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-admin}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ./volumes/n8n_asistente_data:/home/node/.n8n
    depends_on:
      - db
    networks:
      - internal
      - external

networks:
  internal:
    driver: bridge
  external:
    driver: bridge